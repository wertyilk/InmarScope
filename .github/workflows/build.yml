name: Build InmarScope

on:
  push:
    branches: [ "main", "master" ]
  pull_request:
    branches: [ "main", "master" ]
  workflow_dispatch: # allows you to manually trigger the build from the GitHub UI

jobs:
  build-windows:
    name: Build Windows (MinGW-w64)
    runs-on: windows-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
    
    - name: Set up MSYS2
          uses: msys2/setup-msys2@v2
          with:
            msystem: MINGW64
            update: true
            install: >-
              mingw-w64-x86_64-toolchain
              mingw-w64-x86_64-cmake
              mingw-w64-x86_64-ninja
              mingw-w64-x86_64-pkgconf
              mingw-w64-x86_64-glfw
              mingw-w64-x86_64-rtl-sdr
              mingw-w64-x86_64-hackrf
              mingw-w64-x86_64-libusb
              mingw-w64-x86_64-zstd
              mingw-w64-x86_64-libogg
              mingw-w64-x86_64-libvorbis
              mingw-w64-x86_64-sqlite3
              mingw-w64-x86_64-libxml2
              mingw-w64-x86_64-jansson
              mingw-w64-x86_64-airspy

    - name: Configure and Build
      shell: msys2 {0}
      run: |
        cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
        ninja -C build

    - name: Upload Windows Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: InmarScope-Windows-x64
        path: |
          build/*.exe
          build/*.dll

  build-linux:
    name: Build Linux
    runs-on: ubuntu-latest

    steps:
    - name: Checkout repository
      uses: actions/checkout@v4

    - name: Install Dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y \
          build-essential cmake ninja-build pkg-config \
          libglfw3-dev libgl1-mesa-dev \
          librtlsdr-dev libhackrf-dev libusb-1.0-0-dev \
          libzstd-dev zlib1g-dev \
          libogg-dev libvorbis-dev \
          libsqlite3-dev libxml2-dev libjansson-dev \
          libairspy-dev

    - name: Configure and Build
      run: |
        cmake -S . -B build -G Ninja -DCMAKE_BUILD_TYPE=Release
        ninja -C build

    - name: Upload Linux Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: InmarScope-Linux-x64
        path: build/InmarScope
